# Fly.io config for the FRONTIER backend (GROWv2 / growpodempire) — the Flask
# API only — when running `fly launch` / `fly deploy` from the REPOSITORY ROOT.
# Pairs with the root-level Dockerfile, which builds the backend from growpod/.
#
# The public game UI is the separate Next.js app in growpod/web/, served via
# Cloudflare Pages at https://frontierprotocol.app. This API is meant to live
# behind https://api.frontierprotocol.app. Full runbook: growpod/docs/DEPLOY_FLY.md.
app = "frontiernext"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[env]
  # Fly routes to internal_port below; gunicorn binds 0.0.0.0:$PORT.
  PORT = "8080"
  # src/ layout: make the growpodempire package importable (mirrors render.yaml).
  PYTHONPATH = "src"
  # Fail-closed posture (mirrors growpod/fly.toml): force-disables the dev
  # test-clock (/api/dev/clock/*) regardless of GROW_TEST_CLOCK, and makes admin
  # endpoints 503 unless ADMIN_SECRET is explicitly set — WITHOUT this, config.py
  # resolves is_production=False, and require_admin falls back to accepting ANY
  # valid player API key as admin. See config.py is_production and api/auth.py.
  APP_ENV = "production"
  # Browser origin allowed to call /api/* directly (this API lives behind
  # api.frontierprotocol.app; the UI is served from frontierprotocol.app).
  CORS_ALLOWED_ORIGINS = "https://frontierprotocol.app"

# Run schema migrations + the idempotent strain seed before each new version goes
# live, mirroring the existing Render preDeployCommand. This runs in a temporary
# machine and REQUIRES the DATABASE_URL secret to be set first
# (`fly secrets set DATABASE_URL=... -a frontiernext`). To run migrations by
# hand instead, comment this block out.
[deploy]
  release_command = "alembic upgrade head && python -m growpodempire.db.seed"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  # Background threads (seasonal rollover, audio prewarm) catch up on cold start,
  # so scale-to-zero is safe for early deploys. Raise to 1 to keep them warm.
  min_machines_running = 0

  # Real liveness route defined in growpod/src/growpodempire/api/observability.py.
  # (/readiness also exists and pings the DB if you want a deeper check.)
  [[http_service.checks]]
    method = "GET"
    path = "/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
