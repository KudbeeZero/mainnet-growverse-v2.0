name: CI

# The "make truth automatic" gate: lint + memory-integrity + single-head +
# migrations + the full test suite (with the coverage ratchet) + the web checks.
# The project lives in growpod/, so jobs set working-directory accordingly (this
# workflow must sit at the repo root for GitHub to run it).
# push on main covers post-merge; pull_request covers branches (avoids the
# double-run a branch push would otherwise trigger).
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (lint · memory · migrations · tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: growpod
    env:
      PYTHONPATH: src
      DATABASE_URL: "sqlite:////tmp/ci.db"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: growpod/requirements*.txt

      - name: Install deps (runtime + dev + the package, editable)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt ruff
          python -m pip install -e .

      - name: Lint gate (ruff)
        run: python -m ruff check --select=E9,F63,F7,F82 src tests

      - name: Memory integrity (links · ✅ citations · layer map)
        run: python scripts/check_memory.py

      - name: Single Alembic head (no migration forks)
        run: python scripts/check_single_head.py

      - name: Apply migrations
        run: alembic upgrade head

      - name: No model <-> migration drift (2026-07-05 audit)
        run: alembic check

      - name: Tests + coverage gate
        run: python -m pytest -q --cov --cov-report=term-missing

  web:
    name: web (typecheck · lint · build · test · e2e)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: growpod/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: growpod/web/package-lock.json

      # Strict, reproducible install against the committed lockfile (regenerated
      # against the public registry — vitest/playwright deps in sync, no stale
      # firewall URLs). Fails fast if package.json and the lock drift.
      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test (vitest)
        run: npm run test

      - name: E2E (Playwright, mocked API)
        run: |
          npx playwright install --with-deps chromium
          npm run test:e2e
