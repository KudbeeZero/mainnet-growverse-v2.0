# Fly.io config for the growpod Python game API (GrowVerse backend).
#
# Created at "Gate A" — NOT deployed. Creating the app, Postgres, secrets, and
# the first deploy are Gates B–E (owner-approved, one at a time). The deploy MUST
# run from a clean worktree at the committed HEAD so the uncommitted staking work
# is never shipped. Full runbook: docs/DEPLOY_FLY.md.

app = "growverse-api"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

# Before each new release goes live, an ephemeral machine runs migrations + the
# idempotent seed (mirrors the proven render.yaml preDeployCommand). seed.main()
# calls init_db() first, which create_all()s the 4 store tables Alembic doesn't
# yet create — so this finishes with the full, seeded schema. Requires the
# DATABASE_URL secret (set via `fly postgres attach` at Gate C).
[deploy]
  release_command = "sh -c 'alembic upgrade head && python -m growpodempire.db.seed'"

# Non-secret runtime env. DATABASE_URL is a SECRET and is intentionally NOT here
# (set by `fly postgres attach`). config.py normalizes a postgres:// URL for
# SQLAlchemy 2.x automatically.
[env]
  PYTHONPATH = "src"
  PORT = "8080"
  # Fail-closed posture: force-disables the dev test-clock (/api/dev/clock/*)
  # regardless of GROW_TEST_CLOCK, and makes admin endpoints 503 unless
  # ADMIN_SECRET is explicitly set. See config.py is_production.
  APP_ENV = "production"
  # Browser origin allowed to call /api/* directly. Same-origin proxy traffic
  # (Vercel rewrite) isn't subject to this, but set it for safety/direct calls.
  CORS_ALLOWED_ORIGINS = "https://growverse.dev"
  # TEMPORARY (2026-07-02): accept per-worker in-memory rate limits so the app
  # boots in production — no Redis is attached yet, and the fail-closed guard
  # in api/ratelimit.py otherwise refuses to start (this 502'd the first deploy
  # that carried it). Proper fix: `fly redis create`, set RATELIMIT_STORAGE_URI
  # as a secret, then DELETE this line so the guard protects again.
  RATELIMIT_ALLOW_MEMORY = "true"

[http_service]
  internal_port = 8080
  force_https = true
  # Keep one machine warm for reliable login during recovery/testing. Lower to 0
  # later for cost (cold starts) once stable — owner's call.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"
