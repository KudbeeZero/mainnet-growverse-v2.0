# Strain knowledge base — the scientist-grade encyclopedia behind the catalog.
#
# Keyed by strain slug (must match a slug seeded from strains.yaml). This is
# REFERENCE/horticulture metadata: lineage, origin, sensory + effect profile,
# cannabinoid & terpene detail, and cultivation parameters (flowering, optimal
# environment, yields). It is deliberately separate from strains.yaml — that
# file holds the canonical game GENOME; this holds the encyclopedia a grower or
# scientist would want. Surfaced read-only via GET /strains/<id>/knowledge.
#
# Cannabinoid/terpene/grow figures are typical real-world reference ranges for
# the cultivar, not the per-plant game outputs (those come from the simulation).
# Every base-catalog slug MUST have an entry here (enforced by tests).
#
# SCIENTIFIC CAVEATS (see docs/research/2026-06-08-cannabis-strain-genetics-and-cultivation.md):
#   - Strain NAMES are weak genotype/chemotype identifiers (Sawler 2015; Schwabe 2019: ~90% of
#     strains had a genetic outlier). Treat `lineage` as canonical LORE, not verified genetics —
#     especially the clone-era "disputed" lines (OG Kush, Chemdawg, Sour Diesel, Bubba Kush, GG4).
#   - `genotype` (indica/sativa %) is a morphology/lore axis, NOT a reliable predictor of effect or
#     chemistry; the vernacular labels are botanically inverted (McPartland & Guy 2017).
#   - `cannabinoids` THC figures are lab-aggregate/label values, which run ~15-35% HIGH vs assayed
#     flower (Schwabe 2023); read as inflation-biased upper bounds.
#   - Real chemotype collapses to ~3 terpene clusters (myrcene / terpinolene / limonene-caryophyllene);
#     terpinolene-dominant names (Durban Poison, Jack Herer, Haze) are the most reliable.

