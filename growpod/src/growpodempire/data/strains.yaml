# Starter strain catalog. Loaded idempotently (upsert by slug) by db/seed.py.
# `traits` are the canonical gene values; `dominant` lists genes that express as
# dominant (others default to codominant). Display ranges are derived from the
# genome + stability at seed time.
#
# Trait ranges: indica_ratio 0..1, thc 0..35 (%), cbd 0..25 (%),
# flowering_time 45..120 (days), yield 50..800 (g), difficulty 1..5,
# disease_resistance / pest_resistance / vigor 0..1.

strains:
  - name: Afghani
    lineage_type: landrace
    rarity: rare
    stability: 1.0
    terpenes: [myrcene, caryophyllene]
    traits: {indica_ratio: 1.0, thc: 18, cbd: 4, flowering_time: 56, yield: 500, difficulty: 2, disease_resistance: 0.8, pest_resistance: 0.7, vigor: 0.7}
    dominant: [indica_ratio, disease_resistance]

