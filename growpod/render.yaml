databases:
  - name: growv2-db
    databaseName: growpod
    user: growpod
    plan: free

services:
  - type: web
    name: growv2-api
    env: python
    plan: starter
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    # Run schema migrations and (idempotently) seed the strain catalog before
    # the new version goes live.
    preDeployCommand: "alembic upgrade head && python -m growpodempire.db.seed"
    startCommand: "gunicorn -b 0.0.0.0:$PORT -w 2 server:app"
    branch: main
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: growv2-db
          property: connectionString
      # src/ layout: make the growpodempire package importable.
      - key: PYTHONPATH
        value: src
